# Integration stack for the Shelterflex platform.
#
# The application services are consumed as prebuilt images published to GHCR by
# shelterflex-web and shelterflex-api. This repo does not contain, build, or
# vendor their source — the four repositories are independent and integrate at
# the artifact level.
#
# Pin a known-good pair for reproducible runs:
#   API_TAG=sha-84fe55b WEB_TAG=sha-486b4f7 docker compose up
#
# To develop the frontend or backend itself, work in that repository and run it
# directly; see its README. This stack is for integration, not for hot-reload.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shelterflex_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shelterflex_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/shelterflex/shelterflex-api:${API_TAG:-main}
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/shelterflex_dev
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: tenant-documents
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/tenant-documents;
      exit 0;
      "

  frontend:
    image: ghcr.io/shelterflex/shelterflex-web:${WEB_TAG:-main}
    env_file:
      - .env.docker
    environment:
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      backend:
        condition: service_healthy

  stellar-quickstart:
    profiles: ["contracts"]
    image: stellar/quickstart:latest
    command: --standalone --enable-soroban-rpc
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  minio_data:
