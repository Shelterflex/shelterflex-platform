# shelterflex-platform  ->  .github/workflows/e2e.yml
# Full-stack end-to-end tests: brings up the whole stack via docker compose
# (web + api + postgres + minio, pulled in as submodules) and runs the root
# Playwright suite in e2e/ against it.
name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: Full-stack Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Start stack
        run: |
          cp .env.docker .env
          docker compose up -d --build
          # wait for web to answer
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000 >/dev/null && break
            echo "waiting for web ($i)..."; sleep 5
          done

      - name: Install e2e deps
        working-directory: e2e
        run: npm install

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps

      - name: Run e2e
        working-directory: e2e
        env:
          BASE_URL: http://localhost:3000
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 14

      - name: Tear down
        if: always()
        run: docker compose down -v
