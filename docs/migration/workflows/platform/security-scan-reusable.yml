# shelterflex-platform  ->  .github/workflows/security-scan-reusable.yml
#
# Reusable security scan, called by shelterflex-web / -api / -contracts.
# Runs gitleaks (secrets), semgrep, and the Shelterflex TS scanner
# (npm-audit / cargo-audit / eslint / semgrep aggregation) against the CALLER's
# repository. The scanner discovers npm/cargo projects from the repo root, so it
# works per-repo without monorepo-specific paths.
#
# Adapted from the monorepo security-scan.yml. Two differences:
#   1. `on: workflow_call` instead of workflow_dispatch.
#   2. The scanner tool is fetched from this (platform) repo, since it no longer
#      lives alongside the code being scanned.
name: Security Scan (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"
      setup-rust:
        type: boolean
        default: false
      platform-ref:
        description: Git ref of shelterflex-platform to pull the scanner from
        type: string
        default: main

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for secret scanning

      - name: Checkout scanner from platform
        uses: actions/checkout@v4
        with:
          repository: Shelterflex/shelterflex-platform
          ref: ${{ inputs.platform-ref }}
          path: .platform
          sparse-checkout: |
            security-scan
            semgrep.yml
            .gitleaks.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup Rust
        if: ${{ inputs.setup-rust }}
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install scanning tools
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.0_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/ && chmod +x /usr/local/bin/gitleaks
          pip install semgrep
          if [ "${{ inputs.setup-rust }}" = "true" ]; then cargo install cargo-audit --locked; fi

      - name: Install caller dependencies (best effort)
        continue-on-error: true
        run: |
          # npm/pnpm projects are discovered from the repo root by the scanner.
          if [ -f package-lock.json ]; then npm install; fi
          if [ -f pnpm-lock.yaml ]; then corepack enable && pnpm install || true; fi

      - name: Build scanner
        run: |
          cd .platform/security-scan
          npm install typescript @types/node uuid @types/uuid eslint-plugin-security
          npx tsc --outDir dist --module commonjs --target es2022 \
            --esModuleInterop --resolveJsonModule --skipLibCheck \
            --moduleResolution node *.ts scanners/*.ts

      - name: Run security scan
        id: scan
        continue-on-error: true
        env:
          # scanner reads config relative to the platform checkout
          SEMGREP_CONFIG: ${{ github.workspace }}/.platform/semgrep.yml
          GITLEAKS_CONFIG: ${{ github.workspace }}/.platform/.gitleaks.toml
          MODIFIED_FILES: ${{ github.event.pull_request && github.event.pull_request.changed_files || '' }}
        run: |
          # cwd is the caller repo root, so process.cwd() targets the caller's code
          node .platform/security-scan/dist/orchestrator.js || true
          if [ -f security-scan-results.json ]; then
            echo "scan_completed=true" >> "$GITHUB_OUTPUT"
            echo "status=$(jq -r '.status' security-scan-results.json)" >> "$GITHUB_OUTPUT"
          else
            echo "scan_completed=false" >> "$GITHUB_OUTPUT"
            echo "status=error" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload results (JSON)
        if: always() && steps.scan.outputs.scan_completed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results-json
          path: security-scan-results.json
          retention-days: 90

      - name: Generate + upload markdown report
        if: always() && steps.scan.outputs.scan_completed == 'true'
        run: |
          node -e "
          const fs = require('fs');
          const { generateMarkdownReport } = require('./.platform/security-scan/dist/report-generator');
          const r = JSON.parse(fs.readFileSync('security-scan-results.json','utf-8'));
          fs.writeFileSync('security-scan-report.md', generateMarkdownReport(r));
          "

      - name: Upload results (Markdown)
        if: always() && steps.scan.outputs.scan_completed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-report-markdown
          path: security-scan-report.md
          retention-days: 90

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const scanCompleted = '${{ steps.scan.outputs.scan_completed }}' === 'true';
            const marker = '<!-- security-scan-comment -->';
            let body;
            if (!scanCompleted) {
              body = [marker, '## ⚠️ Security Scan', '', '**Status:** Scanner failed to execute.',
                'See the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).',
                '', '*This does not block the merge.*'].join('\n');
            } else {
              const r = JSON.parse(fs.readFileSync('security-scan-results.json','utf-8'));
              const { generatePRComment } = require('./.platform/security-scan/dist/report-generator');
              body = generatePRComment(r);
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number, body });
            }

      - name: Note critical/high (non-blocking)
        if: steps.scan.outputs.status == 'fail'
        run: echo "⚠️ Security scan found critical/high vulnerabilities. Review before merging."
