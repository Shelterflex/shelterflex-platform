# shelterflex-platform  ->  .github/workflows/e2e.yml
# Full-stack end-to-end tests: brings up the whole stack via docker compose
# (web + api + postgres + minio, pulled in as submodules) and runs the root
# Playwright suite in e2e/ against it.
#
# MANUAL ONLY (workflow_dispatch) for now. The root e2e suite was never wired
# into CI in the monorepo and still needs harness work before it can run green:
#   1. Add e2e/package.json (pin @playwright/test ^1.53.2 to match the web app).
#   2. Fix path assumptions in e2e/playwright.config.ts — testDir "./e2e" and
#      globalSetup/globalTeardown "./e2e/helpers/..." assume the config sits at
#      the repo root. Either move the config to the repo root, or change those
#      paths to "." / "./helpers/...".
#   3. These are cross-role UI tests (admin/auth/tenant/landlord/whistleblower)
#      that need a seeded DB + authenticated sessions. Wire test-data seeding and
#      auth bootstrap into globalSetup before expecting them to pass.
# Once the above is done, re-enable the push/pull_request triggers below.
name: E2E

on:
  workflow_dispatch:

jobs:
  e2e:
    name: Full-stack Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Start stack
        run: |
          cp .env.docker .env
          docker compose up -d --build
          # wait for web to answer
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000 >/dev/null && break
            echo "waiting for web ($i)..."; sleep 5
          done

      - name: Install e2e deps
        working-directory: e2e
        run: npm install

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps

      - name: Run e2e
        working-directory: e2e
        env:
          BASE_URL: http://localhost:3000
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 14

      - name: Tear down
        if: always()
        run: docker compose down -v
